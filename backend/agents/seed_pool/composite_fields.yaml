# V-22.6 (2026-05-12) — Composite-field seed pool.
#
# BRAIN ts_op(field, ...) accepts ONE primary field. Multi-field signals must
# be SYNTHESIZED via arithmetic BEFORE ts_op. This file defines 15 arithmetic
# composites covering classical alpha sources:
#   - Value: earnings_yield, pe_synth, book_to_market
#   - Quality: accrual_quality, cfo_yield, asset_turnover, leverage
#   - Intraday: range, close_in_range, intraday_return
#   - Gap: overnight_gap, close_vwap_gap
#   - Returns: synth_returns (fallback when returns missing)
#   - Liquidity: volume_per_cap, vol_per_price
#
# Pipeline (matches V-22.6 design):
#   1. composite_expr — arithmetic synthesis (this file)
#   2. preprocess wraps as `winsorize(ts_backfill(composite_expr, 120), std=4)`
#      to fill sparse fundamental NaN + trim ±4σ outliers
#   3. expand_t1_strategy iterates {ts_rank, ts_zscore, ts_mean, ts_decay_linear,
#      ts_arg_max, ts_arg_min, ts_av_diff, ts_delta} × {5, 10, 20, 60, 120}
#      → 8 ts_op × 5 window = 40 alpha variants per composite
#      → 15 composites × 40 = 600 alpha candidates
#
# Field availability verified against datafields table for region=USA
# universe=TOP3000 on 2026-05-12. Entries for unavailable fields auto-skip
# at load time (CompositeFieldsLoader checks datafields per request).

# -----------------------------------------------------------------------------
# VALUE family — price/fundamental ratios capturing cheap-vs-expensive
# -----------------------------------------------------------------------------
- name: earnings_yield
  family: VALUE
  composite_expr: "divide(ebit, enterprise_value)"
  required_fields: [ebit, enterprise_value]
  desc: "EBIT / EV — capital-structure-neutral earnings yield (Hou-Xue-Zhang)"

- name: pe_synth
  family: VALUE
  composite_expr: "divide(close, eps)"
  required_fields: [close, eps]
  desc: "Synthetic P/E — direct (BRAIN exposes eps as point-in-time)"

- name: book_to_market
  family: VALUE
  composite_expr: "divide(book_value_per_share_2, close)"
  required_fields: [book_value_per_share_2, close]
  desc: "B/M — Fama-French value factor primary input"

- name: sales_to_ev
  family: VALUE
  composite_expr: "divide(revenue, enterprise_value)"
  required_fields: [revenue, enterprise_value]
  desc: "Revenue / EV — sales yield"

# -----------------------------------------------------------------------------
# QUALITY family — earnings sustainability + balance-sheet strength
# -----------------------------------------------------------------------------
- name: accrual_quality
  family: QUALITY
  composite_expr: "divide(cash_flow_from_operations, net_income_total_2)"
  required_fields: [cash_flow_from_operations, net_income_total_2]
  desc: "CFO / NI — Sloan accrual anomaly (high = cash-backed earnings)"

- name: cfo_yield
  family: QUALITY
  composite_expr: "divide(cash_flow_from_operations, cap)"
  required_fields: [cash_flow_from_operations, cap]
  desc: "CFO / Market Cap — cash flow yield"

- name: asset_turnover
  family: QUALITY
  composite_expr: "divide(revenue, fnd6_newa1v1300_at)"
  required_fields: [revenue, fnd6_newa1v1300_at]
  desc: "Sales / Total Assets — capital efficiency (Hou-Xue-Zhang ROA driver)"

- name: leverage_ratio
  family: QUALITY
  composite_expr: "divide(debt_lt, fnd6_teq)"
  required_fields: [debt_lt, fnd6_teq]
  desc: "Long-term Debt / Total Equity — leverage / financial risk"

# -----------------------------------------------------------------------------
# INTRADAY family — within-day price action (no fundamental dependency)
# -----------------------------------------------------------------------------
- name: intraday_range
  family: INTRADAY
  composite_expr: "divide(subtract(high, low), close)"
  required_fields: [high, low, close]
  desc: "(High - Low) / Close — daily volatility / range proxy"

- name: close_in_range
  family: INTRADAY
  composite_expr: "divide(subtract(close, low), subtract(high, low))"
  required_fields: [close, high, low]
  desc: "(Close - Low) / (High - Low) — where close sits in daily range"

- name: intraday_return
  family: INTRADAY
  composite_expr: "divide(subtract(close, open), open)"
  required_fields: [close, open]
  desc: "(Close - Open) / Open — overnight-to-close intraday return"

# -----------------------------------------------------------------------------
# GAP family — overnight + intraday-to-vwap divergence
# -----------------------------------------------------------------------------
- name: overnight_gap
  family: GAP
  composite_expr: "divide(subtract(open, ts_delay(close, 1)), ts_delay(close, 1))"
  required_fields: [open, close]
  desc: "Open / prev Close - 1 — overnight gap return"

- name: close_vwap_gap
  family: GAP
  composite_expr: "divide(subtract(close, vwap), vwap)"
  required_fields: [close, vwap]
  desc: "(Close - VWAP) / VWAP — end-of-day vs intraday-average divergence"

# -----------------------------------------------------------------------------
# LIQUIDITY family — turnover proxies
# -----------------------------------------------------------------------------
- name: volume_per_cap
  family: LIQUIDITY
  composite_expr: "divide(volume, cap)"
  required_fields: [volume, cap]
  desc: "Volume / MarketCap — turnover (Amihud illiquidity inverse)"

- name: vol_per_price
  family: LIQUIDITY
  composite_expr: "divide(volume, close)"
  required_fields: [volume, close]
  desc: "Volume / Close — share-volume proxy"
