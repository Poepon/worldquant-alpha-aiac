# Plan v5+ §决策 3 trade_when 主题条件库
#
# Each theme key matches Hypothesis.expected_signal field values
# (see backend/agents/core/experiment.Hypothesis).
#
# At T3 wrap time, factor_wrapping.expand_t3_strategy reads the seed alpha's
# ancestor hypothesis_id → expected_signal → looks up the matching theme
# here. The "conditions" are entry-filter expressions for trade_when. The
# T3 wrapper becomes:
#   trade_when({condition}, {seed_T2_alpha}, -1)
# where {condition} is one of the chosen entries from this library.
#
# Multiple conditions per theme are intentional — the t3 expand
# samples 1-3 conditions to generate 1-3 T3 variants per seed.
#
# Region-gating: any condition referencing region-specific fields (e.g.,
# fam_*, fnd6_*) is filtered at runtime via field_available() check
# similar to the existing template_available() flow.
#
# Maintenance: regenerate by LLM curate every 1-2 months as new typed
# Hypotheses surface signal-types we don't yet cover.

themes:
  momentum:
    description: "Trends persist over short-medium horizons (Jegadeesh-Titman 1993)"
    conditions:
      - name: "trend_strong"
        expression: "rank(close - ts_delay(close, 5)) > 0.7"
        rationale: "enter on strong recent trend (top 30% xs rank of 5-day return)"
      - name: "near_high"
        expression: "close / ts_max(close, 240) > 0.95"
        rationale: "enter near 1-year high (within 5% of peak)"
      - name: "recent_arg_max"
        expression: "ts_arg_max(close, 60) < 10"
        rationale: "enter when peak occurred recently (within last 10 days)"
      - name: "momentum_buildup"
        expression: "ts_sum(returns > 0, 20) > 12"
        rationale: "majority of last 20 days were up days"

  mean_reversion:
    description: "Short-term overreaction reverses (DeBondt-Thaler 1985)"
    conditions:
      - name: "extreme_negative_zscore"
        expression: "ts_zscore(returns, 60) < -1.5"
        rationale: "enter when 60-day return z-score is unusually low"
      - name: "bottom_decile"
        expression: "rank(returns) < 0.1"
        rationale: "enter on bottom 10% xs rank (extreme underperformer)"
      - name: "near_low"
        expression: "close < ts_min(close, 60) * 1.05"
        rationale: "enter near 60-day low (within 5%)"
      - name: "consecutive_down"
        expression: "ts_sum(returns < 0, 5) >= 4"
        rationale: "4+ down days in last 5"

  volatility:
    description: "Vol-spike / regime-change entry (Engle 1982 ARCH)"
    conditions:
      - name: "vol_spike_15x"
        expression: "ts_std_dev(returns, 20) > ts_mean(ts_std_dev(returns, 20), 60) * 1.5"
        rationale: "20-day vol > 1.5× its 60-day mean (high-vol regime entry)"
      - name: "vol_zscore_high"
        expression: "ts_zscore(ts_std_dev(returns, 5), 60) > 1.5"
        rationale: "5-day vol unusually high vs history"
      - name: "abs_return_2sigma"
        expression: "abs(returns) > ts_std_dev(returns, 60) * 2"
        rationale: "today's move > 2 historical std"

  liquidity:
    description: "Volume / turnover surge (Amihud 2002 illiquidity)"
    conditions:
      - name: "volume_above_mean"
        expression: "volume > ts_mean(volume, 240)"
        rationale: "above 1-year avg volume"
      - name: "volume_zscore"
        expression: "ts_zscore(volume, 20) > 1.5"
        rationale: "volume 1.5+ std above 20-day mean"
      - name: "turnover_spike"
        expression: "(amount / cap) > ts_mean((amount / cap), 60) * 1.5"
        rationale: "turnover (amount/cap) 1.5× normal"

  value:
    description: "Cheap-on-fundamentals (Fama-French 1996)"
    conditions:
      - name: "low_pe_decile"
        expression: "rank(divide(close, fnd6_eps_per_share)) < 0.2"
        rationale: "bottom 20% PE (cheap relative to peers)"
      - name: "low_pb_decile"
        expression: "rank(divide(close, fnd6_book_per_share)) < 0.2"
        rationale: "bottom 20% PB"
      - name: "earnings_yield_top"
        expression: "rank(divide(fnd6_eps_per_share, close)) > 0.8"
        rationale: "top 20% earnings yield"

  sentiment:
    description: "Social/news sentiment extremes (Tetlock 2007)"
    conditions:
      - name: "buzz_high"
        expression: "rank(snt1_news_buzz) > 0.8"
        rationale: "top 20% news buzz"
      - name: "buzz_zscore"
        expression: "ts_zscore(snt1_news_buzz, 20) > 1.5"
        rationale: "buzz 1.5+ std above recent mean"
      - name: "sentiment_extreme_neg"
        expression: "rank(snt1_score) < 0.1"
        rationale: "bottom 10% sentiment (contrarian buy signal)"

  event_driven:
    description: "PEAD / earnings / corporate events (Bernard-Thomas 1989)"
    conditions:
      - name: "earnings_window_short"
        expression: "less(days_to_announcement, 5)"
        rationale: "within 5 days of earnings"
      - name: "post_earnings_drift"
        expression: "less(abs(days_from_announcement), 10)"
        rationale: "10-day window post announcement"
      - name: "eps_surprise_large"
        expression: "abs(fam_eps_surprise) > 0.05"
        rationale: "EPS surprise > 5%"

  quality:
    description: "Profitability / accruals quality (Sloan 1996, Asness)"
    conditions:
      - name: "high_roe_decile"
        expression: "rank(fnd6_roe_proxy) > 0.7"
        rationale: "top 30% ROE"
      - name: "low_accruals"
        expression: "rank(divide(fnd6_cfo_per_share, fnd6_eps_per_share)) > 0.7"
        rationale: "high CFO/earnings ratio (clean accruals)"

  contrarian:
    description: "Crowded trade reversal — short alias of mean_reversion"
    conditions:
      - name: "extreme_xs_rank"
        expression: "rank(returns) < 0.05"
        rationale: "bottom 5% xs rank (most punished)"
      - name: "drawdown_severe"
        expression: "(close / ts_max(close, 240)) < 0.7"
        rationale: "30%+ drawdown from 1-year high"

  reversal:
    description: "Short-term reversal — alias of mean_reversion"
    conditions:
      - name: "5day_zscore_low"
        expression: "ts_zscore(returns, 5) < -1.5"
        rationale: "5-day return z-score < -1.5"

  default:
    description: "Fallback when expected_signal not in library"
    conditions:
      - name: "high_volume_default"
        expression: "volume > ts_mean(volume, 240)"
        rationale: "general above-average liquidity entry"
      - name: "vol_regime_default"
        expression: "ts_std_dev(returns, 20) > ts_mean(ts_std_dev(returns, 20), 60) * 1.2"
        rationale: "20% above normal vol regime"

# Aliases — map signal-name variants to canonical themes above
aliases:
  volatility_prediction: volatility
  volatility_regime: volatility
  volatility_term_structure: volatility
  regime_change: volatility
  regime_detection: volatility
  risk_adjustment: volatility
  defensive: quality
  unknown: default
  other: default

# Fields-that-may-not-exist guard. The loader will skip conditions
# whose expression references any of these fields if the field is not
# present in the region's datafields table.
region_field_guards:
  CHN:
    skip_fields:
      - days_to_announcement
      - days_from_announcement
      - fam_eps_surprise
      - snt1_news_buzz
      - snt1_score
  EUR:
    skip_fields:
      - days_to_announcement
      - fam_eps_surprise
  ASI:
    skip_fields:
      - days_to_announcement
      - fam_eps_surprise
